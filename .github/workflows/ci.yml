name: CI

on:
  push:
    branches: [master, dev]
  pull_request:
    branches: [master, dev]

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  checks: write # for dorny/test-reporter
  pull-requests: write # for dorny/test-reporter PR comment

jobs:
  lint:
    name: Lint & format check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest
      - run: bun install --frozen-lockfile

      # Lint/format issues are surfaced as PR annotations + a comment, but never
      # fail the job (continue-on-error keeps the job green on non-zero exits).
      - name: ESLint (annotations)
        continue-on-error: true
        run: bunx eslint . --format github

      - name: ESLint (report)
        continue-on-error: true
        run: bunx eslint . --format stylish 2>&1 | tee eslint-report.txt

      - name: Prettier --check
        continue-on-error: true
        run: |
          set +e
          bunx prettier --check . 2>&1 | tee prettier-report.txt
          # Emit a ::warning annotation for each unformatted file.
          grep -E '^\[warn\] ' prettier-report.txt | sed -E 's/^\[warn\] //' \
            | while read -r f; do
                echo "::warning file=$f::File is not formatted (run \`bun run format\`)"
              done
          exit 0

      - name: Build lint/format report
        if: github.event_name == 'pull_request'
        run: |
          {
            echo "## Lint & format check"
            echo
            echo "> These are warnings only and do **not** block merge."
            echo

            echo "### ESLint"
            echo '```'
            if [ -s eslint-report.txt ]; then
              cat eslint-report.txt
            else
              echo "No issues."
            fi
            echo '```'
            echo

            echo "### Prettier"
            unformatted=$(grep -E '^\[warn\] ' prettier-report.txt | sed -E 's/^\[warn\] //' || true)
            if [ -n "$unformatted" ]; then
              echo "Files needing formatting (run \`bun run format\`):"
              echo
              echo "$unformatted" | sed 's/^/- /'
            else
              echo "All files formatted."
            fi
          } > lint-report.md

      - name: Post lint/format comment
        if: github.event_name == 'pull_request'
        uses: marocchino/sticky-pull-request-comment@v3
        with:
          header: lint-format
          path: lint-report.md

  typecheck:
    name: Typecheck
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest
      - run: bun install --frozen-lockfile
      - name: tsc --noEmit
        run: bunx tsc --noEmit

  test:
    name: Tests + Coverage
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest
      - run: bun install --frozen-lockfile

      # The `storybook` Vitest project renders every story in a real Chromium
      # via Playwright. CI runners don't ship the browser binaries, so we
      # install just chromium (~150 MB) — full browser set is unnecessary.
      - name: Install Playwright Chromium
        run: bunx playwright install --with-deps chromium

      # One Vitest run covers both projects (unit + storybook) and emits the
      # merged coverage report. Text output is teed for the PR comment table.
      - name: Run Vitest with coverage
        run: |
          set -o pipefail
          bun run coverage 2>&1 | tee coverage-text.txt

      - name: Report test results
        uses: dorny/test-reporter@v3
        if: always()
        with:
          name: Vitest results
          path: test-results/junit.xml
          reporter: jest-junit
          fail-on-error: true

      # Sticky PR comment with the merged coverage summary. Updates in place on
      # subsequent pushes thanks to the `header` key.
      - name: Post coverage summary
        if: github.event_name == 'pull_request'
        uses: davelosert/vitest-coverage-report-action@v2
        with:
          json-summary-path: coverage/coverage-summary.json
          json-final-path: coverage/coverage-final.json
          comment-on: pr
          name: coverage

      # Always upload the full report so it can be downloaded from the run
      # page (lcov-report/index.html browsable, lcov.info for codecov-style
      # tools downstream).
      - name: Upload coverage artifact
        if: always()
        uses: actions/upload-artifact@v6
        with:
          name: coverage-report
          path: coverage/
          retention-days: 14

  build:
    name: Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest
      - run: bun install --frozen-lockfile
      - name: vite build
        run: bun run build

  e2e:
    name: E2E (Playwright + local Supabase)
    runs-on: ubuntu-latest
    # ubuntu-latest ships Docker preinstalled, which is all `supabase start`
    # needs. The whole stack boots in ~25-35s; the 3 tests run in ~1 min.
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v6
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest
      - run: bun install --frozen-lockfile

      # --with-deps installs the apt packages chromium needs on the runner;
      # we only need chromium (the suite has one project), not the full set.
      - name: Install Playwright Chromium
        run: bunx playwright install --with-deps chromium

      # Boots Postgres, REST, Realtime, Auth, etc. in Docker containers and
      # applies supabase/migrations/ automatically. Blocking — exits when the
      # stack is healthy, which is what tests/e2e/global-setup.ts expects.
      - name: Start local Supabase
        run: bunx supabase start

      # Playwright spawns `vite dev --mode e2e` itself via webServer; .env.e2e
      # supplies the deterministic local anon key + 127.0.0.1:54321 URL.
      - name: Run Playwright
        run: bun run test:e2e

      # On failure: html report + traces + videos (trace/video are set to
      # retain-on-failure in playwright.config.ts, so successful runs upload
      # nothing of size). On success the step is skipped entirely.
      - name: Upload Playwright artifacts
        if: failure()
        uses: actions/upload-artifact@v6
        with:
          name: playwright-report
          path: |
            playwright-report/
            test-results/
          retention-days: 14

      # Best-effort cleanup. Runner is ephemeral so not strictly needed, but
      # `if: always()` ensures a hung container can't block the runner cache.
      - name: Stop local Supabase
        if: always()
        run: bunx supabase stop --no-backup || true

  storybook:
    name: Build Storybook
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest
      - run: bun install --frozen-lockfile
      - name: storybook build
        run: bun run build-storybook
