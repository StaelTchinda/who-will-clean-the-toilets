<!-- Load the app fonts via <link> here rather than relying on the @import in
     src/styles.css, which Storybook's stricter PostCSS rejects (it isn't the
     first statement). Keeps stories visually faithful without editing app CSS. -->
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link
  href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=Inter:wght@400;500;600;700&display=swap"
  rel="stylesheet"
/>
